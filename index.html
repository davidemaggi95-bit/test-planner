    const DatePicker = ({ value, onChange, onClose }) => {
      const [viewDate, setViewDate] = useState(new Date(value));
      const today = startOfDay(new Date());

      const year = viewDate.getFullYear();
      const month = viewDate.getMonth();
      const firstOfMonth = new Date(year, month, 1);
      const firstWeekday = firstOfMonth.getDay(); // 0=Sun
      // Adjust so week starts Monday (Italian convention)
      const offset = (firstWeekday + 6) % 7;
      const daysInMonth = new Date(year, month+1, 0).getDate();

      const cells = [];
      for (let i = 0; i < offset; i++) cells.push(null);
      for (let d = 1; d <= daysInMonth; d++) cells.push(new Date(year, month, d));
      while (cells.length % 7 !== 0) cells.push(null);

              onClick={goPrev}
              className="w-10 h-10 rounded-full bg-primary-50 text-primary-600 hover:bg-primary-100 active:bg-primary-200 flex items-center justify-center transition-colors"
              aria-label="Mese precedente"
            >
              <Icon name="chevron-left" className="w-6 h-6" strokeWidth={2.5} />
            </button>
            <div className="text-base font-semibold text-slate-900 capitalize">
              {MONTHS_IT[month]} {year}
            </div>
            <button
              onClick={goNext}
              className="w-10 h-10 rounded-full bg-primary-50 text-primary-600 hover:bg-primary-100 active:bg-primary-200 flex items-center justify-center transition-colors"
              aria-label="Mese successivo"
            >
              <Icon name="chevron-right" className="w-6 h-6" strokeWidth={2.5} />
            </button>
          </div>
          {/* weekday labels */}
          <div className="grid grid-cols-7 gap-1 mb-1">
            {WEEKDAYS_IT.map((w, i) => (
              <div key={i} className="text-[10px] font-medium text-slate-400 text-center py-1">{w}</div>
            ))}
          </div>
          {/* days */}
          <div className="grid grid-cols-7 gap-1">
            {cells.map((d, i) => {
              if (!d) return <div key={i} />;
              const isSelected = isSameDay(d, value);
              const isToday    = isSameDay(d, today);
              return (
                <button
                  key={i}
                  onClick={() => { onChange(d); onClose(); }}
                  className={`
                    h-9 w-9 text-sm rounded-lg flex items-center justify-center transition
                    ${isSelected ? 'bg-primary-600 text-white font-semibold' :
                      isToday    ? 'bg-primary-50  text-primary-700 font-semibold' :
                                   'text-slate-700 hover:bg-slate-100'}
                  `}
                >
                  {d.getDate()}
                </button>
              );
            })}
          </div>
          {/* footer: today shortcut */}
          <div className="mt-2 pt-2 border-t border-slate-100 flex justify-between items-center">
            <button
              onClick={() => {
                const now = startOfDay(new Date());
                setViewDate(now);
                onChange(now);
                onClose();
              }}
              className="text-xs font-semibold text-primary-600 hover:text-primary-700 px-3 py-1.5 rounded-lg hover:bg-primary-50"
            >
              Oggi
            </button>
            <button
              onClick={onClose}
              className="text-xs font-medium text-slate-500 hover:text-slate-700 px-3 py-1.5 rounded-lg hover:bg-slate-50"
            >
              Chiudi
            </button>
          </div>
        </div>
      );
    };

    /* ─────────────────────────────────────────────────────────────
       PLANNER PAGE
       ─────────────────────────────────────────────────────────── */

    const CELL_W = 58;       // pixel width per day cell (compact)
    const ROW_H  = 56;       // pixel height per apartment row (compact)
    const SIDEBAR_W = 110;   // apartment column width (compact)
    const WINDOW_DAYS = 30;  // load ±30 days from selected date

    const Planner = ({ onOpenBooking }) => {
      const [selectedDate, setSelectedDate] = useState(new Date(2026, 4, 14)); // May 14, 2026
      const [pickerOpen, setPickerOpen]     = useState(false);
      const today = startOfDay(new Date());

      // Window: ±30 days from selectedDate. But: never start before 2026-01-01.
      const HARD_START = new Date(2026, 0, 1);
      const desiredStart = addDays(selectedDate, -WINDOW_DAYS);
      const rangeStart = desiredStart < HARD_START ? HARD_START : desiredStart;
      const rangeEnd   = addDays(selectedDate, WINDOW_DAYS);

      const days = useMemo(() => {
        const total = diffDays(rangeStart, rangeEnd) + 1;
        return Array.from({ length: total }, (_, i) => addDays(rangeStart, i));
      }, [rangeStart.getTime(), rangeEnd.getTime()]);

      // Scroll to selected date column on mount/date change
      const timelineRef = useRef(null);
      useEffect(() => {
        if (!timelineRef.current) return;
        const idx = diffDays(rangeStart, selectedDate);
        const x = idx * CELL_W - (timelineRef.current.clientWidth / 2) + (CELL_W / 2);
        timelineRef.current.scrollTo({ left: Math.max(0, x), behavior: 'smooth' });
      }, [selectedDate.getTime()]);

      // Filter bookings that intersect the window
      const visibleBookings = useMemo(() => {
        return BOOKINGS.filter(b => {
          const ci = parseISO(b.check_in);
          const co = parseISO(b.check_out);
          return co >= rangeStart && ci <= rangeEnd;
        });
      }, [rangeStart.getTime(), rangeEnd.getTime()]);

      return (
        <div className="flex flex-col h-full bg-white">
          {/* ─── Header ─── */}
          <div className="bg-primary-600 text-white px-5 pt-6 pb-5 relative">
            <div className="flex items-start justify-between">
              <div className="relative">
                <h1 className="text-3xl font-bold tracking-tight">Planner</h1>
                <button
                  onClick={() => setPickerOpen(v => !v)}
                  className="mt-1 flex items-center gap-1 text-sm text-white/95 hover:text-white"
                >
                  <span>{fmtItalianShort(selectedDate)}</span>
                  <Icon name="chevron-down" className="w-4 h-4" strokeWidth={2.5} />
                </button>
                {pickerOpen && (
                  <DatePicker
                    value={selectedDate}
                    onChange={(d) => setSelectedDate(d)}
                    onClose={() => setPickerOpen(false)}
                  />
                )}
              </div>

              <div className="flex items-center gap-2">
                <button className="w-10 h-10 rounded-full bg-white/15 hover:bg-white/25 flex items-center justify-center">
                  <Icon name="rotate-cw" className="w-5 h-5 text-white" />
                </button>
                <button
                  onClick={() => setSelectedDate(today)}
                  className="w-10 h-10 rounded-full bg-white/15 hover:bg-white/25 flex items-center justify-center"
                  title="Oggi"
                >
                  <Icon name="target" className="w-5 h-5 text-white" />
                </button>
                <button className="w-10 h-10 rounded-full bg-white/15 hover:bg-white/25 flex items-center justify-center">
                  <Icon name="filter" className="w-5 h-5 text-white" />
                </button>
              </div>
            </div>
          </div>

          {/* close picker when clicking outside */}
          {pickerOpen && (
            <div
              className="fixed inset-0 z-40"
              onClick={() => setPickerOpen(false)}
            />
          )}

          {/* ─── Timeline ─── */}
          <div className="flex-1 overflow-hidden flex flex-col">
            <div
              ref={timelineRef}
              className="flex-1 overflow-auto no-scrollbar relative"
              style={{ scrollBehavior: 'smooth' }}
            >
              {/* Inner container with fixed pixel width */}
              <div style={{ width: SIDEBAR_W + days.length * CELL_W }}>
                {/* Header row (day labels) */}
                <div
                  className="sticky top-0 z-20 bg-white border-b border-slate-200 flex"
                  style={{ height: 48 }}
                >
                  {/* sidebar spacer */}
                  <div
                    className="sticky left-0 z-30 bg-white border-r border-slate-200"
                    style={{ width: SIDEBAR_W, minWidth: SIDEBAR_W }}
                  />
                  {/* day cells */}
                  {days.map((d, i) => {
                    const isSelected = isSameDay(d, selectedDate);
                    const isToday    = isSameDay(d, today);
                    return (
                      <div
                        key={i}
                        className="flex flex-col items-center justify-center text-[10px]"
                        style={{ width: CELL_W, minWidth: CELL_W }}
                      >
                        <div className={`uppercase tracking-wide ${isSelected ? 'text-primary-600 font-semibold' : 'text-slate-400'}`}>
                          {DAYS_SHORT[d.getDay()]}
                        </div>
                        <div
                          className={`
                            mt-0.5 w-7 h-7 rounded-full flex items-center justify-center text-[13px] font-medium
                            ${isSelected ? 'bg-primary-600 text-white' :
                              isToday    ? 'border border-primary-600 text-primary-600' :
                                           'text-slate-700'}
                          `}
                        >
                          {d.getDate()}
                        </div>
                      </div>
                    );
                  })}
                </div>

                {/* Apartment rows */}
                {APARTMENTS.map((apt) => (
                  <div
                    key={apt.id}
                    className="flex border-b border-slate-100 relative"
                    style={{ height: ROW_H }}
                  >
                    {/* sidebar: apartment label */}
                    <div
                      className="sticky left-0 z-10 bg-white border-r border-slate-200 flex items-center px-2"
                      style={{ width: SIDEBAR_W, minWidth: SIDEBAR_W }}
                    >
                      <div className="w-[3px] h-7 bg-primary-600 rounded-full mr-2 flex-shrink-0" />
                      <div className="text-[11px] leading-tight text-slate-800 font-medium line-clamp-2">
                        {apt.name}
                      </div>
                    </div>

                    {/* day cells grid */}
                    {days.map((d, i) => {
                      const isSelected = isSameDay(d, selectedDate);
                      return (
                        <div
                          key={i}
                          className={`border-r border-slate-100 ${isSelected ? 'bg-primary-50/40' : ''}`}
                          style={{ width: CELL_W, minWidth: CELL_W }}
                        />
                      );
                    })}

                    {/* Booking pills for this apartment */}
                    {visibleBookings
                      .filter(b => b.apartment_id === apt.id)
                      .map(b => {
                        const ci = parseISO(b.check_in);
                        const co = parseISO(b.check_out);
                        const startIdx = Math.max(0, diffDays(rangeStart, ci));
                        const endIdx   = Math.min(days.length, diffDays(rangeStart, co) + 1);
                        // Use half-day offset to mimic check-in noon / check-out noon convention
                        const leftPx  = SIDEBAR_W + startIdx * CELL_W + CELL_W * 0.5;
                        const widthPx = (endIdx - startIdx) * CELL_W - CELL_W;
                        if (widthPx <= 0) return null;

                        const isPast = co < today;
                        const meta = CHANNEL_META[b.channel];

                        return (
                          <button
                            key={b.code}
                            onClick={() => onOpenBooking(b.code)}
                            className="absolute flex items-center gap-1.5 rounded-full pl-1 pr-2 text-white text-xs font-medium shadow-sm hover:shadow-md transition-shadow"
                            style={{
                              left: leftPx,
                              width: widthPx,
                              top: (ROW_H - 26) / 2,
                              height: 26,
                              opacity: isPast ? 0.55 : 1,
                              backgroundColor: '#16A34A', // Krossbooking green
                            }}
                            title={`${b.guests} • ${b.last_name} ${b.first_name}`}
                          >
                            <span className="w-[20px] h-[20px] rounded-full bg-white flex items-center justify-center flex-shrink-0">
                              <ChannelLogo channel={b.channel} className="w-[14px] h-[14px]" />
                            </span>
                            <span className="truncate text-[11px]">
                              {b.guests} • {b.last_name} {b.first_name}
                            </span>
                          </button>
                        );
                      })}
                  </div>
                ))}
              </div>
            </div>
          </div>
        </div>
      );
    };

    /* ─────────────────────────────────────────────────────────────
       BOOKING DETAIL PAGE
       ─────────────────────────────────────────────────────────── */

    const STATUS_META = {
      confirmed: { label: 'Confermata', bg: 'bg-ok',     ring: 'ring-ok' },
      pending:   { label: 'In attesa',  bg: 'bg-warn',   ring: 'ring-warn' },
      cancelled: { label: 'Cancellata', bg: 'bg-danger', ring: 'ring-danger' },
    };

    // Channel logo SVG renderers — official brand glyphs simplified for circular badge
    const ChannelLogo = ({ channel, className = 'w-6 h-6' }) => {
      if (channel === 'booking') {
        // Booking.com — stylized "B." in brand navy
        return (
          <svg viewBox="0 0 32 32" className={className} xmlns="http://www.w3.org/2000/svg">
            <text x="16" y="23" textAnchor="middle"
                  fontFamily="-apple-system, system-ui, sans-serif"
                  fontWeight="900" fontSize="22" fill="#003B95">B.</text>
          </svg>
        );
      }
      if (channel === 'airbnb') {
        // Airbnb "Bélo" mark — official rounded loop shape
        return (
          <svg viewBox="0 0 32 32" className={className} xmlns="http://www.w3.org/2000/svg">
            <path fill="#FF385C" d="M16 3.5c-2.1 0-3.7 1.5-4.6 3.1-.7 1.1-1.4 2.5-2.2 4-.8 1.5-1.6 3-2.4 4.6-1.6 3.1-3 6.4-3 8.8 0 2.7 2 4.8 4.5 4.8 1.8 0 3.4-.9 4.6-2.1.8.8 2 1.4 3.1 1.4s2.3-.6 3.1-1.4c1.2 1.2 2.8 2.1 4.6 2.1 2.5 0 4.5-2.1 4.5-4.8 0-2.4-1.4-5.7-3-8.8-.8-1.6-1.6-3.1-2.4-4.6-.8-1.5-1.5-2.9-2.2-4-.9-1.6-2.5-3.1-4.6-3.1zm0 2.3c1.1 0 2 .8 2.6 1.9.6.9 1.3 2.3 2.1 3.7.8 1.5 1.6 3 2.3 4.5 1.6 3 2.8 6 2.8 7.6 0 1.5-1 2.5-2.2 2.5-1.2 0-2.4-.7-3.3-1.7.8-1 1.3-2.2 1.3-3.4 0-2.1-1.6-3.7-3.6-3.7s-3.6 1.6-3.6 3.7c0 1.2.5 2.4 1.3 3.4-.9 1-2.1 1.7-3.3 1.7-1.2 0-2.2-1-2.2-2.5 0-1.6 1.2-4.6 2.8-7.6.7-1.5 1.5-3 2.3-4.5.8-1.4 1.5-2.8 2.1-3.7.6-1.1 1.5-1.9 2.6-1.9zm0 14.4c.8 0 1.4.6 1.4 1.5 0 .6-.3 1.2-.7 1.7-.3.3-.5.4-.7.4s-.4-.1-.7-.4c-.4-.5-.7-1.1-.7-1.7 0-.9.6-1.5 1.4-1.5z"/>
          </svg>
        );
      }
      if (channel === 'vrbo') {
        // VRBO — stylized house with V silhouette
        return (
          <svg viewBox="0 0 32 32" className={className} xmlns="http://www.w3.org/2000/svg">
            <text x="16" y="22" textAnchor="middle"
                  fontFamily="-apple-system, system-ui, sans-serif"
                  fontWeight="900" fontSize="14" fill="#0F61B5"
                  letterSpacing="-0.5">VRBO</text>
          </svg>
        );
      }
      return null;
    };

    // Channel badge: circular white container with the brand SVG inside
    const ChannelBadge = ({ channel, size = 'lg' }) => {
      const dims = size === 'lg'
        ? { box: 'w-11 h-11', svg: 'w-7 h-7' }
        : { box: 'w-7 h-7',   svg: 'w-5 h-5' };
      return (
        <div className={`${dims.box} rounded-full bg-white border border-slate-200 flex items-center justify-center shadow-sm flex-shrink-0`}>
          <ChannelLogo channel={channel} className={dims.svg} />
        </div>
      );
    };

    // Reusable row: LABEL (uppercase) ........... value
    const DetailRow = ({ label, children, last }) => (
      <div className={`flex items-center justify-between py-3 ${last ? '' : 'border-b border-slate-100'}`}>
        <span className="text-[11px] font-semibold tracking-wider text-slate-400 uppercase">{label}</span>
        <span className="text-[15px] text-slate-900 text-right ml-3 min-w-0 truncate">
          {children ?? <span className="text-slate-300">-</span>}
        </span>
      </div>
    );

    const Tab = ({ active, children, onClick }) => (
      <button
        onClick={onClick}
        className={`
          px-5 py-2 rounded-full text-sm font-semibold transition-all flex-shrink-0
          ${active
            ? 'bg-primary-600 text-white shadow-md'
            : 'bg-white text-slate-700 border border-slate-200 hover:border-slate-300'}
        `}
      >
        {children}
      </button>
    );

    const BookingDetail = ({ code, onBack }) => {
      const booking = useMemo(() => BOOKINGS.find(b => b.code === code), [code]);
      const [tab, setTab] = useState('dettagli');

      // Internal notes persisted in localStorage by booking code
      const notesKey = `pms_notes_${code}`;
      const [internalNotes, setInternalNotes] = useState(() => {
        try { return localStorage.getItem(notesKey) || ''; } catch { return ''; }
      });
      useEffect(() => {
        try { localStorage.setItem(notesKey, internalNotes); } catch {}
      }, [notesKey, internalNotes]);

      if (!booking) {
        return (
          <div className="flex flex-col h-full bg-white items-center justify-center px-6 text-center">
            <Icon name="alert-circle" className="w-12 h-12 text-slate-300 mb-3" />
            <p className="text-slate-600">Prenotazione non trovata.</p>
            <button onClick={onBack} className="mt-4 px-4 py-2 rounded-lg bg-primary-600 text-white text-sm font-medium">
              Torna al planner
            </button>
          </div>
        );
      }

      const apt = APARTMENTS.find(a => a.id === booking.apartment_id);
      const meta = CHANNEL_META[booking.channel];
      const statusMeta = STATUS_META[booking.status] || STATUS_META.confirmed;
      const nights = diffDays(parseISO(booking.check_in), parseISO(booking.check_out));
      const fullName = `${booking.last_name} ${booking.first_name}`;
      const mapsUrl = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(apt.address)}`;

      return (
        <div className="flex flex-col h-full" style={{ background: '#F0F2FA' }}>
          {/* ─── Header gradient ─── */}
          <div
            className="relative px-4 pt-6 pb-6 text-white"
            style={{ background: 'linear-gradient(180deg, #2563EB 0%, #3B82F6 100%)' }}
          >
            <div className="flex items-start justify-between">
              <button
                onClick={onBack}
                className="w-11 h-11 rounded-full bg-white/25 hover:bg-white/35 backdrop-blur-sm flex items-center justify-center transition-colors"
                aria-label="Indietro"
              >
                <Icon name="arrow-left" className="w-5 h-5 text-white" strokeWidth={2.5} />
              </button>

              <div className="flex-1 text-center px-3">
                <h1 className="text-[22px] font-bold leading-tight">{fullName}</h1>
                <p className="text-sm text-white/90 mt-1">
                  {fmtDateRangeShort(booking.check_in, booking.check_out)}
                </p>
              </div>

              <button
                className="w-11 h-11 rounded-full bg-white/25 hover:bg-white/35 backdrop-blur-sm flex items-center justify-center transition-colors"
                aria-label="Altre azioni"
              >
                <Icon name="more-vertical" className="w-5 h-5 text-white" strokeWidth={2.5} />
              </button>
            </div>
          </div>

          {/* ─── Body ─── */}
          <div className="flex-1 overflow-y-auto pb-6">
            {/* Summary card (overlapping the header) */}
            <div className="mx-4 bg-white rounded-2xl shadow-sm border border-slate-100 p-4">
              <div className="flex items-start gap-3">
                <ChannelBadge channel={booking.channel} />
                <div className="flex-1 min-w-0">
                  <div className="text-[15px] font-semibold text-slate-900">Prenotazione {booking.code}</div>
                  <div className="text-sm text-slate-500 mt-0.5 truncate">{apt.name}</div>
                </div>
                <button className="w-10 h-10 rounded-full bg-slate-100 hover:bg-slate-200 flex items-center justify-center flex-shrink-0">
                  <Icon name="message-circle" className="w-5 h-5 text-slate-600" />
                </button>
              </div>
              <div className="flex items-center justify-between mt-3">
                <div className="flex items-center gap-4 text-slate-500 text-sm">
                  <span className="flex items-center gap-1">
                    <Icon name="bed-double" className="w-4 h-4" /> {booking.rooms}
                  </span>
                  <span className="flex items-center gap-1">
                    <Icon name="users" className="w-4 h-4" /> {booking.guests}
                  </span>
                  <span className="flex items-center gap-1">
                    <Icon name="moon" className="w-4 h-4" /> {nights}
                  </span>
                </div>
                <div className="text-primary-600 font-semibold text-[15px]">
                  Tot {fmtMoney(booking.total_eur)} €
                </div>
              </div>
            </div>

            {/* Tabs */}
            <div className="px-4 mt-5 flex gap-2 overflow-x-auto no-scrollbar">
              <Tab active={tab === 'dettagli'} onClick={() => setTab('dettagli')}>Dettagli</Tab>
              <Tab active={tab === 'ospiti'}   onClick={() => setTab('ospiti')}>Ospiti</Tab>
            </div>

            {/* Tab content */}
            <div className="px-4 mt-4 space-y-4">
              {tab === 'dettagli' && (
                <>
                  {/* Card 1: anagrafica prenotazione */}
                  <div className="bg-white rounded-2xl border border-slate-100 px-4">
                    <DetailRow label="Ospite">{fullName}</DetailRow>
                    <DetailRow label="Data prenotazione">{fmtDateLong(booking.booking_date)}</DetailRow>
                    <DetailRow label="Arrivo">{fmtDateLong(booking.check_in)}</DetailRow>
                    <DetailRow label="Partenza">{fmtDateLong(booking.check_out)}</DetailRow>
                    <DetailRow label="Ora di arrivo">{booking.check_in_time}</DetailRow>
                    <DetailRow label="Ora di partenza">{booking.check_out_time}</DetailRow>
                    <DetailRow label="Canale">
                      <span className="inline-flex items-center gap-2">
                        <span>{meta.full}</span>
                        <ChannelBadge channel={booking.channel} size="sm" />
                      </span>
                    </DetailRow>
                    <DetailRow label="Nazione">
                      <span className="inline-flex items-center gap-2">
                        <span>{booking.country}</span>
                        <span className="text-lg leading-none">{flagEmoji(booking.country)}</span>
                      </span>
                    </DetailRow>
                    <DetailRow label="Notti">{nights}</DetailRow>
                    <DetailRow label="Ospiti" last>{booking.guests}</DetailRow>
                  </div>

                  {/* Card 2: dati ospite */}
                  <div>
                    <h3 className="text-lg font-bold text-slate-900 mb-2 px-1">Dati ospite</h3>
                    <div className="bg-white rounded-2xl border border-slate-100 p-4">
                      <div className="flex items-center justify-between py-2 border-b border-slate-100">
                        <span className="text-[15px] text-slate-600">Telefono</span>
                        <a href={`tel:${booking.phone}`} className="text-[15px] text-slate-900 font-medium">
                          {booking.phone}
                        </a>
                      </div>
                      <div className="flex items-center justify-between py-2">
                        <span className="text-[15px] text-slate-600">Email</span>
                        <a
                          href={`mailto:${booking.email}`}
                          className="text-[15px] text-slate-900 font-medium truncate ml-3 max-w-[60%] text-right"
                        >
                          {booking.email}
                        </a>
                      </div>
                      <button className="mt-3 w-full py-3 rounded-full bg-primary-50 text-primary-600 font-semibold text-[15px] hover:bg-primary-100 transition-colors">
                        Contatta l'ospite
                      </button>
                    </div>
                  </div>

                  {/* Card 5: note interne (editable, persisted in localStorage) */}
                  <div>
                    <h3 className="text-lg font-bold text-slate-900 mb-2 px-1">Note interne</h3>
                    <div className="bg-white rounded-2xl border border-slate-100 p-3">
                      <textarea
                        value={internalNotes}
                        onChange={(e) => setInternalNotes(e.target.value)}
                        placeholder="Scrivi note..."
                        rows={4}
                        className="w-full text-[15px] text-slate-900 placeholder-slate-400 resize-none focus:outline-none p-1 bg-transparent"
                      />
                    </div>
                    {internalNotes && (
                      <p className="text-[11px] text-slate-400 mt-1.5 px-1">
                        ✓ Salvato automaticamente
                      </p>
                    )}
                  </div>
                </>
              )}

              {tab === 'ospiti' && (
                <div className="bg-white rounded-2xl border border-slate-100 p-8 text-center">
                  <div className="w-14 h-14 rounded-2xl bg-primary-50 flex items-center justify-center mx-auto mb-3">
                    <Icon name="users" className="w-7 h-7 text-primary-600" />
                  </div>
                  <h3 className="text-base font-semibold text-slate-900">Lista ospiti</h3>
                  <p className="text-sm text-slate-500 mt-1">
                    Definiremo questa sezione in uno step successivo
                    <br />(documenti, Alloggiati Web, dati anagrafici).
                  </p>
                </div>
              )}
            </div>
          </div>
        </div>
      );
    };

    /* ─────────────────────────────────────────────────────────────
       CALENDARI — vista esterna (lista appartamenti)
       ─────────────────────────────────────────────────────────── */

    // Mock gradient thumbnails — color derived from apt id for visual variety
    const APT_GRADIENTS = {
      a1: 'from-rose-400 to-pink-500',
      a2: 'from-amber-400 to-orange-500',
      a3: 'from-emerald-400 to-teal-500',
      a4: 'from-sky-400 to-blue-500',
      a5: 'from-violet-400 to-purple-500',
      a6: 'from-cyan-400 to-blue-500',
      a7: 'from-fuchsia-400 to-pink-500',
      a8: 'from-lime-400 to-green-500',
      a9: 'from-indigo-400 to-blue-600',
    };

    // Get bookings that occupy a given apartment on a given date
    const bookingOnDay = (aptId, date) => {
      const day = startOfDay(date);
      return BOOKINGS.find(b => {
        if (b.apartment_id !== aptId) return false;
        const ci = parseISO(b.check_in);
        const co = parseISO(b.check_out);
        return day >= ci && day < co; // checkout day itself is free
      });
    };

    const CalendariList = ({ onOpenApartment }) => {
      // Build a 35-day occupancy pattern (5 weeks) for the dot-strip preview, Airbnb style
      const today = startOfDay(new Date());
      const buildStrip = (aptId) => {
        return Array.from({ length: 35 }, (_, i) => {
          const d = addDays(today, i);
          const b = bookingOnDay(aptId, d);
          const isCenter = i === 17; // small red ring on a single "today-ish" cell, like Airbnb
          return { date: d, booking: b, center: isCenter };
        });
      };

      return (
        <div className="flex flex-col h-full bg-white">
          {/* Title block — Airbnb style: big title, no border, no header bar */}
          <div className="px-5 pt-12 pb-4">
            <h1 className="text-[34px] font-extrabold tracking-tight text-slate-900 leading-none">
              Calendari
            </h1>
          </div>

          {/* Apartment list */}
          <div className="flex-1 overflow-y-auto px-4 pb-4 space-y-3">
            {APARTMENTS.map(apt => {
              const strip = buildStrip(apt.id);
              const gradient = APT_GRADIENTS[apt.id] || 'from-slate-400 to-slate-500';
              return (
                <button
                  key={apt.id}
                  onClick={() => onOpenApartment(apt.id)}
                  className="w-full bg-white rounded-2xl border border-slate-200 hover:border-slate-300 active:scale-[0.99] transition-all p-3 flex items-center gap-3 text-left"
                  style={{ boxShadow: '0 1px 2px rgba(0,0,0,0.04)' }}
                >
                  {/* Thumbnail — square, rounded */}
                  <div className={`w-[88px] h-[88px] rounded-xl bg-gradient-to-br ${gradient} flex items-center justify-center flex-shrink-0 shadow-inner`}>
                    <span className="text-white font-bold text-lg drop-shadow-sm">{apt.code}</span>
                  </div>

                  {/* Name + address */}
                  <div className="flex-1 min-w-0 pr-1">
                    <div className="text-[16px] font-semibold text-slate-900 leading-tight line-clamp-2">
                      {apt.name}
                    </div>
                    <div className="mt-1 text-[12px] text-slate-500 line-clamp-2 leading-snug">
                      {apt.address}
                    </div>
                  </div>

                  {/* Mini availability dot pattern — Airbnb style 7×5 grid */}
                  <div className="flex-shrink-0 w-[110px]">
                    <div className="grid grid-cols-7 gap-[3px]">
                      {strip.map((s, i) => {
                        if (s.booking) {
                          return (
                            <div key={i} className="h-[6px] rounded-full" style={{ backgroundColor: '#16A34A' }} />
                          );
                        }
                        if (s.center) {
                          return (
                            <div key={i} className="h-[6px] w-[6px] rounded-full border-[1.5px] border-airbnb mx-auto" />
                          );
                        }
                        return (
                          <div key={i} className="h-[6px] w-[6px] rounded-full bg-slate-300 mx-auto" />
                        );
                      })}
                    </div>
                  </div>
                </button>
              );
            })}
          </div>
        </div>
      );
    };

    /* ─────────────────────────────────────────────────────────────
       CALENDARI — vista interna (singolo appartamento)
       ─────────────────────────────────────────────────────────── */

    // Helpers for Airbnb-style grid: figure out, for a given month, the start/end positions
    // of each booking pill (rows of 7 cells)
    const buildMonthBookingPills = (year, month, aptId) => {
      // Find all bookings that touch this month
      const monthStart = new Date(year, month, 1);
      const monthEnd   = new Date(year, month + 1, 0); // last day
      const offset = (monthStart.getDay() + 6) % 7;     // Mon-start

      const monthBookings = BOOKINGS.filter(b => {
        if (b.apartment_id !== aptId) return false;
        const ci = parseISO(b.check_in);
        const co = parseISO(b.check_out);
        // overlap with month
        return co > monthStart && ci <= monthEnd;
      });

      const pills = [];
      monthBookings.forEach(b => {
        const ci = parseISO(b.check_in);
        const co = parseISO(b.check_out);
        // Clamp to this month
        const startDay = Math.max(1, ci.getDate() - (ci < monthStart ? -999 : 0));
        // The pill starts on max(ci, monthStart), ends on min(co, monthEnd+1) — but Airbnb shows
        // the pill from check-in DAY through the day BEFORE checkout
        const pillStart = ci < monthStart ? monthStart : ci;
        const pillEnd   = co > new Date(year, month + 1, 1) ? new Date(year, month + 1, 1) : co;
        // pillEnd is exclusive (checkout day excluded), but Airbnb often shows the pill ending
        // mid-cell on checkout day. We'll occupy [pillStart, pillEnd) days.

        // Convert to cell indices in the grid (0-based, including offset)
        const startCellIdx = offset + (pillStart.getDate() - 1);
        // Number of days covered = (pillEnd - pillStart) days (excluded). If checkout day in same month, that day is "free".
        const days = Math.max(1, Math.round((pillEnd - pillStart) / 86400000));
        const endCellIdx = startCellIdx + days - 1; // inclusive last cell

        // Split into rows (each row = 7 cells)
        let s = startCellIdx;
        while (s <= endCellIdx) {
          const rowEnd = Math.floor(s / 7) * 7 + 6;
          const e = Math.min(rowEnd, endCellIdx);
          pills.push({
            booking: b,
            rowIdx: Math.floor(s / 7),
            colStart: s % 7,
            colEnd:   e % 7,
            // is this the first/last segment of the booking inside this month?
            isStart: s === startCellIdx && ci >= monthStart,
            isEnd:   e === endCellIdx && co <= new Date(year, month + 1, 1),
          });
          s = e + 1;
        }
      });

      return pills;
    };

    // A single month grid — Airbnb style
    const MonthGrid = ({ year, month, aptId, onOpenBooking }) => {
      const today = startOfDay(new Date());
      const firstOfMonth = new Date(year, month, 1);
      const offset = (firstOfMonth.getDay() + 6) % 7;
      const daysInMonth = new Date(year, month + 1, 0).getDate();
      const WEEKDAYS = ['L','M','M','G','V','S','D'];

      // Build cells array with offset
      const cells = [];
      for (let i = 0; i < offset; i++) cells.push(null);
      for (let d = 1; d <= daysInMonth; d++) cells.push(new Date(year, month, d));
      while (cells.length % 7 !== 0) cells.push(null);
      const totalRows = cells.length / 7;

      const pills = buildMonthBookingPills(year, month, aptId);

      const CELL_HEIGHT = 64;  // px

      return (
        <div className="px-4 pt-2 pb-4">
          {/* Month title — Airbnb: lowercase, very large, left aligned */}
          <h3 className="text-[26px] font-extrabold text-slate-900 tracking-tight lowercase mb-3">
            {MONTHS_IT[month]}
            {month === 0 && <span className="font-normal text-slate-400 ml-2">{year}</span>}
          </h3>

          {/* Weekday labels */}
          <div className="grid grid-cols-7 gap-[3px] mb-1">
            {WEEKDAYS.map((w, i) => (
              <div key={i} className="text-[12px] font-medium text-slate-500 text-center py-1 uppercase">{w}</div>
            ))}
          </div>

          {/* Cells grid */}
          <div className="relative">
            <div className="grid grid-cols-7 gap-[3px]">
              {cells.map((d, i) => {
                if (!d) {
                  return <div key={i} style={{ height: CELL_HEIGHT }} />;
                }
                const isPast = d < today;
                const isToday = isSameDay(d, today);
                const occupied = pills.some(p => {
                  const cellRow = Math.floor(i / 7);
                  const cellCol = i % 7;
                  return p.rowIdx === cellRow && cellCol >= p.colStart && cellCol <= p.colEnd;
                });
                return (
                  <div
                    key={i}
                    className="rounded-xl border border-slate-200 bg-white flex items-start justify-start px-2 pt-1.5 relative overflow-hidden"
                    style={{ height: CELL_HEIGHT }}
                  >
                    <span className={`
                      text-[15px] font-semibold relative z-20
                      ${isPast && !occupied ? 'text-slate-300 line-through' :
                        isToday ? 'text-airbnb' :
                        'text-slate-900'}
                    `}>
                      {isToday ? (
                        <span className="inline-flex items-center justify-center w-6 h-6 rounded-full border-[1.5px] border-airbnb">
                          {d.getDate()}
                        </span>
                      ) : d.getDate()}
                    </span>
                  </div>
                );
              })}
            </div>

            {/* Booking pills overlay — green (Krossbooking style), clickable */}
            {pills.map((p, idx) => {
              const colW = `calc((100% - 3px * 6) / 7)`;
              const left = `calc((${colW} + 3px) * ${p.colStart})`;
              const width = `calc((${colW} + 3px) * ${p.colEnd - p.colStart + 1} - 3px)`;
              const top = p.rowIdx * (CELL_HEIGHT + 3) + CELL_HEIGHT / 2 + 2;
              return (
                <button
                  key={idx}
                  onClick={() => onOpenBooking && onOpenBooking(p.booking.code)}
                  className="absolute text-white text-xs font-medium flex items-center gap-1.5 z-10 shadow-sm hover:shadow-md transition-shadow"
                  style={{
                    left,
                    width,
                    top,
                    height: 26,
                    paddingLeft: p.isStart ? 3 : 6,
                    paddingRight: p.isEnd ? 8 : 4,
                    backgroundColor: '#16A34A', // Krossbooking green
                    borderTopLeftRadius:    p.isStart ? 13 : 0,
                    borderBottomLeftRadius: p.isStart ? 13 : 0,
                    borderTopRightRadius:    p.isEnd ? 13 : 0,
                    borderBottomRightRadius: p.isEnd ? 13 : 0,
                  }}
                  title={`${p.booking.last_name} ${p.booking.first_name}`}
                >
                  {p.isStart && (
                    <div className="w-[22px] h-[22px] rounded-full bg-white flex items-center justify-center flex-shrink-0">
                      <ChannelLogo channel={p.booking.channel} className="w-[14px] h-[14px]" />
                    </div>
                  )}
                  <span className="truncate text-[11px]">
                    {p.isStart ? `${p.booking.guests} • ${p.booking.last_name}` : ''}
                  </span>
                </button>
              );
            })}
          </div>
        </div>
      );
    };

    const CalendariDetail = ({ apartmentId, onBack, onOpenBooking }) => {
      const apt = APARTMENTS.find(a => a.id === apartmentId);
      const today = new Date();
      const startMonth = today.getMonth();
      const startYear  = today.getFullYear();

      // 12 months starting from current
      const months = useMemo(() => {
        return Array.from({ length: 12 }, (_, i) => {
          const m = (startMonth + i) % 12;
          const y = startYear + Math.floor((startMonth + i) / 12);
          return { year: y, month: m };
        });
      }, [startMonth, startYear]);

      // Scroll-to-top button visibility
      const scrollRef = useRef(null);
      const [showTop, setShowTop] = useState(false);
      const handleScroll = useCallback(() => {
        if (!scrollRef.current) return;
        setShowTop(scrollRef.current.scrollTop > 400);
      }, []);

      if (!apt) {
        return (
          <div className="flex flex-col h-full items-center justify-center bg-white text-slate-500">
            Appartamento non trovato.
          </div>
        );
      }

      return (
        <div className="flex flex-col h-full bg-white relative">
          {/* Sticky header — Airbnb style: back arrow + truncated title + circular action buttons */}
          <div className="bg-white px-4 pt-5 pb-3 flex items-center gap-2 border-b border-slate-100">
            <button
              onClick={onBack}
              className="w-10 h-10 rounded-full hover:bg-slate-100 active:bg-slate-200 flex items-center justify-center flex-shrink-0"
            >
              <Icon name="arrow-left" className="w-5 h-5 text-slate-900" strokeWidth={2.5} />
            </button>
            <div className="flex-1 min-w-0 px-1">
              <div className="text-[17px] font-bold text-slate-900 truncate">{apt.name}</div>
            </div>
            <button className="w-10 h-10 rounded-full bg-slate-100 hover:bg-slate-200 flex items-center justify-center flex-shrink-0">
              <Icon name="calendar" className="w-5 h-5 text-slate-700" />
            </button>
            <button className="w-10 h-10 rounded-full bg-slate-100 hover:bg-slate-200 flex items-center justify-center flex-shrink-0">
              <Icon name="settings" className="w-5 h-5 text-slate-700" />
            </button>
          </div>

          {/* Scrollable months */}
          <div
            ref={scrollRef}
            onScroll={handleScroll}
            className="flex-1 overflow-y-auto"
          >
            {months.map((m, i) => (
              <MonthGrid key={`${m.year}-${m.month}`} year={m.year} month={m.month} aptId={apt.id} onOpenBooking={onOpenBooking} />
            ))}
            <div className="px-4 py-6 text-center text-xs text-slate-400">
              12 mesi visualizzati
            </div>
          </div>

          {/* Scroll-to-top floating button — Airbnb style */}
          {showTop && (
            <button
              onClick={() => scrollRef.current && scrollRef.current.scrollTo({ top: 0, behavior: 'smooth' })}
              className="absolute bottom-5 right-5 w-12 h-12 rounded-full bg-white shadow-lg border border-slate-200 flex items-center justify-center"
              aria-label="Torna su"
            >
              <Icon name="arrow-up" className="w-5 h-5 text-slate-900" strokeWidth={2.5} />
            </button>
          )}
        </div>
      );
    };

    /* ─────────────────────────────────────────────────────────────
       PRENOTAZIONI — list page (Booking Pulse style, light theme)
       ─────────────────────────────────────────────────────────── */

    const PAGE_SIZE = 30;

    const Prenotazioni = ({ onOpenBooking }) => {
      const [query, setQuery] = useState('');
      const [sortBy, setSortBy] = useState('arrival'); // 'arrival' | 'booking'
      const [filtersOpen, setFiltersOpen] = useState(false);
      const [channelFilter, setChannelFilter] = useState('all');
      const [aptFilter, setAptFilter] = useState('all');
      const [statusFilter, setStatusFilter] = useState('all');
      const [groupByApt, setGroupByApt] = useState(false);
      const [visibleCount, setVisibleCount] = useState(PAGE_SIZE);

      // Apply filters + search + sort
      const filtered = useMemo(() => {
        const q = query.trim().toLowerCase();
        let arr = BOOKINGS.filter(b => {
          if (channelFilter !== 'all' && b.channel !== channelFilter) return false;
          if (aptFilter !== 'all' && b.apartment_id !== aptFilter) return false;
          if (statusFilter !== 'all' && b.status !== statusFilter) return false;
          if (q) {
            const haystack = `${b.first_name} ${b.last_name} ${b.code}`.toLowerCase();
            if (!haystack.includes(q)) return false;
          }
          return true;
        });
        const key = sortBy === 'arrival' ? 'check_in' : 'booking_date';
        arr.sort((a, b) => a[key].localeCompare(b[key]));
        return arr;
      }, [query, sortBy, channelFilter, aptFilter, statusFilter]);

      // Reset visibleCount when filters change
      useEffect(() => { setVisibleCount(PAGE_SIZE); }, [query, sortBy, channelFilter, aptFilter, statusFilter, groupByApt]);

      const paginated = filtered.slice(0, visibleCount);
      const hasMore = filtered.length > paginated.length;

      // Active filter count for the badge
      const activeFilters =
        (channelFilter !== 'all' ? 1 : 0) +
        (aptFilter !== 'all' ? 1 : 0) +
        (statusFilter !== 'all' ? 1 : 0) +
        (groupByApt ? 1 : 0);

      const clearFilters = () => {
        setChannelFilter('all');
        setAptFilter('all');
        setStatusFilter('all');
        setGroupByApt(false);
      };

      // Group bookings either by date or by apartment
      const groups = useMemo(() => {
        if (groupByApt) {
          const map = new Map();
          paginated.forEach(b => {
            if (!map.has(b.apartment_id)) map.set(b.apartment_id, []);
            map.get(b.apartment_id).push(b);
          });
          return Array.from(map.entries()).map(([aptId, items]) => {
            const apt = APARTMENTS.find(a => a.id === aptId);
            return { label: apt ? apt.name : aptId, items };
          });
        }
        // Group by date (the sort key)
        const key = sortBy === 'arrival' ? 'check_in' : 'booking_date';
        const map = new Map();
        paginated.forEach(b => {
          const d = b[key];
          if (!map.has(d)) map.set(d, []);
          map.get(d).push(b);
        });
        return Array.from(map.entries()).map(([dateStr, items]) => {
          const d = parseISO(dateStr);
          return { label: fmtItalianFull(d), items };
        });
      }, [paginated, sortBy, groupByApt]);

      return (
        <div className="flex flex-col h-full bg-slate-50">
          {/* Header */}
          <div className="bg-white px-5 pt-6 pb-3 border-b border-slate-100">
            <div className="flex items-center justify-between mb-3">
              <h1 className="text-[28px] font-bold tracking-tight text-slate-900">Prenotazioni</h1>
              <button
                onClick={() => setFiltersOpen(v => !v)}
                className={`relative w-10 h-10 rounded-full flex items-center justify-center transition ${
                  filtersOpen || activeFilters > 0 ? 'bg-primary-50 text-primary-600' : 'hover:bg-slate-100 text-slate-700'
                }`}
                aria-label="Filtri"
              >
                <Icon name="filter" className="w-5 h-5" />
                {activeFilters > 0 && (
                  <span className="absolute -top-1 -right-1 w-4 h-4 rounded-full bg-primary-600 text-white text-[10px] font-bold flex items-center justify-center">
                    {activeFilters}
                  </span>
                )}
              </button>
            </div>

            {/* Search */}
            <div className="flex items-center bg-slate-100 rounded-full px-4 py-2.5">
              <Icon name="search" className="w-4 h-4 text-slate-400 mr-2" />
              <input
                type="text"
                value={query}
                onChange={(e) => setQuery(e.target.value)}
                placeholder="Cerca prenotazioni..."
                className="flex-1 bg-transparent text-sm text-slate-900 placeholder-slate-400 focus:outline-none"
              />
              {query && (
                <button onClick={() => setQuery('')}>
                  <Icon name="x" className="w-4 h-4 text-slate-400" />
                </button>
              )}
            </div>

            {/* Sort toggle */}
            <div className="mt-3 flex bg-slate-100 rounded-full p-1 text-sm">
              <button
                onClick={() => setSortBy('arrival')}
                className={`flex-1 py-2 rounded-full font-medium transition ${
                  sortBy === 'arrival' ? 'bg-white text-slate-900 shadow-sm' : 'text-slate-500'
                }`}
              >
                Data di arrivo
              </button>
              <button
                onClick={() => setSortBy('booking')}
                className={`flex-1 py-2 rounded-full font-medium transition ${
                  sortBy === 'booking' ? 'bg-white text-slate-900 shadow-sm' : 'text-slate-500'
                }`}
              >
                Data della prenotazione
              </button>
            </div>
          </div>

          {/* Filters panel (collapsible) */}
          {filtersOpen && (
            <div className="bg-white border-b border-slate-100 px-5 py-4 space-y-3 animate-slide-down">
              {/* Canale */}
              <FilterPills
                label="Canale"
                value={channelFilter}
                onChange={setChannelFilter}
                options={[
                  { v: 'all', label: 'Tutti' },
                  { v: 'booking', label: 'Booking' },
                  { v: 'airbnb',  label: 'Airbnb' },
                  { v: 'vrbo',    label: 'VRBO' },
                ]}
              />
              {/* Appartamento */}
              <FilterPills
                label="Appartamento"
                value={aptFilter}
                onChange={setAptFilter}
                options={[
                  { v: 'all', label: 'Tutti' },
                  ...APARTMENTS.map(a => ({ v: a.id, label: a.short })),
                ]}
              />
              {/* Stato */}
              <FilterPills
                label="Stato"
                value={statusFilter}
                onChange={setStatusFilter}
                options={[
                  { v: 'all',       label: 'Tutti' },
                  { v: 'confirmed', label: 'Confermata' },
                  { v: 'pending',   label: 'In attesa' },
                  { v: 'cancelled', label: 'Cancellata' },
                ]}
              />
              {/* Group toggle */}
              <div className="flex items-center justify-between pt-2 border-t border-slate-100">
                <span className="text-[13px] font-semibold text-slate-700">Raggruppa per appartamento</span>
                <button
                  onClick={() => setGroupByApt(v => !v)}
                  className={`relative w-11 h-6 rounded-full transition ${groupByApt ? 'bg-primary-600' : 'bg-slate-300'}`}
                  aria-label="Toggle raggruppamento"
                >
                  <span
                    className={`absolute top-0.5 left-0.5 w-5 h-5 rounded-full bg-white shadow transition-transform ${
                      groupByApt ? 'translate-x-5' : 'translate-x-0'
                    }`}
                  />
                </button>
              </div>
              {/* Clear */}
              {activeFilters > 0 && (
                <button
                  onClick={clearFilters}
                  className="w-full mt-1 py-2 text-sm font-medium text-primary-600 hover:bg-primary-50 rounded-lg"
                >
                  Azzera filtri
                </button>
              )}
            </div>
          )}

          {/* List */}
          <div className="flex-1 overflow-y-auto">
            {filtered.length === 0 && (
              <div className="flex flex-col items-center justify-center py-16 px-6 text-center">
                <div className="w-14 h-14 rounded-2xl bg-slate-100 flex items-center justify-center mb-3">
                  <Icon name="search" className="w-6 h-6 text-slate-400" />
                </div>
                <p className="text-slate-700 font-medium">Nessuna prenotazione trovata</p>
                <p className="text-sm text-slate-400 mt-1">Prova a modificare i filtri o la ricerca</p>
              </div>
            )}

            {groups.map((g, gi) => (
              <div key={gi}>
                {/* Group header (date or apartment) */}
                <div className="sticky top-0 z-10 bg-slate-50/95 backdrop-blur px-5 py-2 text-[12px] font-semibold text-slate-500 uppercase tracking-wide">
                  {g.label}
                </div>
                <div className="px-4 pb-2 space-y-2">
                  {g.items.map(b => (
                    <BookingListCard key={b.code} booking={b} onClick={() => onOpenBooking(b.code)} />
                  ))}
                </div>
              </div>
            ))}

            {/* Load more */}
            {hasMore && (
              <div className="px-4 py-4">
                <button
                  onClick={() => setVisibleCount(c => c + PAGE_SIZE)}
                  className="w-full py-3 rounded-xl bg-white border border-slate-200 hover:border-primary-300 text-primary-600 font-semibold text-sm transition"
                >
                  Carica altre ({filtered.length - paginated.length})
                </button>
              </div>
            )}

            {!hasMore && paginated.length > 0 && (
              <div className="px-4 py-6 text-center text-[12px] text-slate-400">
                {paginated.length} {paginated.length === 1 ? 'prenotazione' : 'prenotazioni'}
              </div>
            )}
          </div>
        </div>
      );
    };

    // Filter pills row — used inside the filter panel
    const FilterPills = ({ label, value, onChange, options }) => (
      <div>
        <div className="text-[11px] font-semibold tracking-wider text-slate-400 uppercase mb-1.5">{label}</div>
        <div className="flex gap-2 overflow-x-auto no-scrollbar -mx-1 px-1">
          {options.map(opt => {
            const active = value === opt.v;
            return (
              <button
                key={opt.v}
                onClick={() => onChange(opt.v)}
                className={`flex-shrink-0 px-3 py-1.5 rounded-full text-[13px] font-medium border transition ${
                  active
                    ? 'bg-primary-600 text-white border-primary-600'
                    : 'bg-white text-slate-700 border-slate-200 hover:border-slate-300'
                }`}
              >
                {opt.label}
              </button>
            );
          })}
        </div>
      </div>
    );

    // Single booking card (Booking Pulse style)
    const BookingListCard = React.memo(({ booking, onClick }) => {
      const apt = APARTMENTS.find(a => a.id === booking.apartment_id);
      const nights = diffDays(parseISO(booking.check_in), parseISO(booking.check_out));
      const isGenius = booking.channel === 'booking'; // mock: assume some Booking guests are Genius
      const today = startOfDay(new Date());
      const isPast = parseISO(booking.check_out) < today;
      const statusBadge =
        booking.status === 'cancelled' ? { label: 'Cancellata', cls: 'bg-danger/10 text-danger' } :
        booking.status === 'pending'   ? { label: 'In attesa',  cls: 'bg-warn/10 text-warn'     } :
        null;

      return (
        <button
          onClick={onClick}
          className={`w-full bg-white rounded-2xl border border-slate-100 hover:border-slate-200 hover:shadow-sm active:scale-[0.99] transition p-3 flex items-start gap-3 text-left ${isPast ? 'opacity-70' : ''}`}
        >
          {/* Channel badge */}
          <ChannelBadge channel={booking.channel} />

          {/* Main info */}
          <div className="flex-1 min-w-0">
            <div className="flex items-center gap-1.5 flex-wrap">
              <span className="text-[15px] font-semibold text-slate-900 truncate max-w-[60%]">
                {booking.last_name} {booking.first_name}
              </span>
              {isGenius && (
                <span className="text-[9px] font-bold px-1.5 py-0.5 rounded bg-blue-100 text-booking">
                  Genius
                </span>
              )}
              {statusBadge && (
                <span className={`text-[9px] font-bold px-1.5 py-0.5 rounded ${statusBadge.cls}`}>
                  {statusBadge.label}
                </span>
              )}
            </div>
            <div className="text-[13px] text-slate-600 mt-0.5">
              {fmtDateRangeShort(booking.check_in, booking.check_out)} · {nights} {nights === 1 ? 'notte' : 'notti'}
            </div>
            <div className="flex items-center gap-3 text-[12px] text-slate-500 mt-1">
              <span className="flex items-center gap-1">
                <Icon name="users" className="w-3.5 h-3.5" /> {booking.guests}
              </span>
              <span className="truncate">{apt ? apt.name : ''}</span>
            </div>
          </div>

          {/* Chat icon */}
          <div className="w-9 h-9 rounded-full bg-slate-100 flex items-center justify-center flex-shrink-0">
            <Icon name="message-circle" className="w-4 h-4 text-slate-600" />
          </div>
        </button>
      );
    });

    /* ─────────────────────────────────────────────────────────────
       PLACEHOLDER PAGES (we'll build these in next steps)
       ─────────────────────────────────────────────────────────── */
    const Placeholder = ({ title, subtitle }) => (
      <div className="flex flex-col h-full items-center justify-center text-center px-6 bg-white">
        <div className="w-16 h-16 rounded-2xl bg-primary-50 flex items-center justify-center mb-4">
          <Icon name="construction" className="w-8 h-8 text-primary-600" />
        </div>
        <h2 className="text-xl font-semibold text-slate-900">{title}</h2>
        <p className="mt-1.5 text-sm text-slate-500 max-w-xs">{subtitle}</p>
      </div>
    );

    /* ─────────────────────────────────────────────────────────────
       BOTTOM NAV
       ─────────────────────────────────────────────────────────── */
    const NAV_ITEMS = [
      { id: 'home',         label: 'Home',         icon: 'home' },
      { id: 'planner',      label: 'Planner',      icon: 'calendar-days' },
      { id: 'calendari',    label: 'Calendari',    icon: 'calendar-check' },
      { id: 'prenotazioni', label: 'Prenotazioni', icon: 'list-checks' },
    ];

    const BottomNav = ({ active, onChange }) => (
      <nav className="border-t border-slate-200 bg-white grid grid-cols-4 h-[68px] safe-bottom">
        {NAV_ITEMS.map(item => {
          const isActive = active === item.id;
          return (
            <button
              key={item.id}
              onClick={() => onChange(item.id)}
              className={`flex flex-col items-center justify-center gap-0.5 ${isActive ? 'text-primary-600' : 'text-slate-500'}`}
            >
              <Icon name={item.icon} className="w-5 h-5" strokeWidth={isActive ? 2.4 : 2} />
              <span className={`text-[11px] ${isActive ? 'font-semibold' : 'font-medium'}`}>{item.label}</span>
            </button>
          );
        })}
      </nav>
    );

    /* ─────────────────────────────────────────────────────────────
       APP SHELL — simple state-based routing (no React Router needed)
       ─────────────────────────────────────────────────────────── */
    const App = () => {
      const [route, setRoute] = useState({ name: 'planner' });

      // openBooking remembers where we came from so the back button returns there
      const openBooking = (code, origin) => setRoute({ name: 'booking', code, origin });

      const renderPage = () => {
        switch (route.name) {
          case 'home':
            return <Placeholder title="Home" subtitle="La nuova home stile Krossbooking arriverà nello step 5." />;
          case 'planner':
            return <Planner onOpenBooking={(code) => openBooking(code, { name: 'planner' })} />;
          case 'calendari':
            return <CalendariList
                     onOpenApartment={(id) => setRoute({ name: 'calendari-detail', apartmentId: id })}
                   />;
          case 'calendari-detail':
            return <CalendariDetail
                     apartmentId={route.apartmentId}
                     onBack={() => setRoute({ name: 'calendari' })}
                     onOpenBooking={(code) => openBooking(code, { name: 'calendari-detail', apartmentId: route.apartmentId })}
                   />;
          case 'prenotazioni':
            return <Prenotazioni
                     onOpenBooking={(code) => openBooking(code, { name: 'prenotazioni' })}
                   />;
          case 'booking':
            return <BookingDetail
                     code={route.code}
                     onBack={() => setRoute(route.origin || { name: 'planner' })}
                   />;
          default:
            return null;
        }
      };

      // Active nav id mapping
      const activeNav =
        ['home','planner','calendari','prenotazioni'].includes(route.name) ? route.name :
        route.name === 'calendari-detail' ? 'calendari' :
        route.name === 'booking' && route.origin ? (
          ['home','planner','calendari','prenotazioni'].includes(route.origin.name)
            ? route.origin.name
            : route.origin.name === 'calendari-detail' ? 'calendari' : 'planner'
        ) : 'planner';

      // Hide bottom nav on full-screen detail views
      const hideNav = route.name === 'booking' || route.name === 'calendari-detail';

      return (
        <div className="flex flex-col h-full max-w-[480px] mx-auto bg-white shadow-2xl">
          <div className="flex-1 overflow-hidden">
            {renderPage()}
          </div>
          {!hideNav && (
            <BottomNav active={activeNav} onChange={(id) => setRoute({ name: id })} />
          )}
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
